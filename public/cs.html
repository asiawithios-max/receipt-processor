<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Service — Receipt Processor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a2e; min-height: 100vh; padding-bottom: 40px; }

.cs-header { background: #1a1a2e; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
.cs-header-left { display: flex; align-items: center; gap: 10px; }
.cs-header img { height: 36px; width: auto; object-fit: contain; }
.cs-header-name { color: #e0c97a; font-size: 14px; font-weight: 700; }
.cs-header-role { color: #888; font-size: 11px; }
.cs-header-right { display: flex; align-items: center; gap: 10px; }
.session-timer { color: #888; font-size: 11px; font-family: monospace; }
.session-timer.warning { color: #e74c3c; }
.btn-logout { padding: 6px 14px; background: transparent; border: 1px solid #555; color: #888; border-radius: 6px; font-size: 12px; cursor: pointer; }
.btn-logout:hover { border-color: #e74c3c; color: #e74c3c; }

.stats-bar { display: flex; gap: 1px; background: #e0e0e0; border-bottom: 1px solid #e0e0e0; }
.stat-item { flex: 1; background: #fff; padding: 12px 8px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; color: #1a1a2e; }
.stat-lbl { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }

.filter-bar { display: flex; overflow-x: auto; gap: 0; background: #fff; border-bottom: 1px solid #eee; padding: 0 4px; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-tab { padding: 10px 14px; background: transparent; border: none; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
.filter-tab.active { color: #1a1a2e; border-bottom-color: #c9a84c; }

.search-bar { padding: 12px 16px; background: #fff; border-bottom: 1px solid #eee; display: flex; gap: 10px; }
.search-bar input { flex: 1; padding: 10px 14px; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 14px; }
.search-bar input:focus { outline: none; border-color: #c9a84c; }
.rep-filter { padding: 10px 14px; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 13px; color: #555; background: #fff; cursor: pointer; min-width: 130px; }
.rep-filter:focus { outline: none; border-color: #c9a84c; }

.sub-list { padding: 12px 16px; display: flex; flex-direction: column; }

.sub-card {
  background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer;
  border: 1px solid #eee; border-left: 4px solid #dde1e7;
  display: block; width: 100%;
}
.sub-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.09); }
.sub-card.status-unsent  { border-left-color: #dde1e7; }
.sub-card.status-sent    { border-left-color: #f0c040; }
.sub-card.status-viewed  { border-left-color: #5aacff; }
.sub-card.status-signed  { border-left-color: #40c070; }

.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-unsent  { background: #f0f0f0; color: #888; }
.badge-sent    { background: #fff3cd; color: #856404; }
.badge-viewed  { background: #cfe2ff; color: #084298; }
.badge-signed  { background: #d4edda; color: #155724; }
.badge-crm     { background: #d4edda; color: #155724; font-size: 10px; }
.badge-refunded { background: #ffe0e0; color: #c0392b; }
.refund-callout { background: #fff3cd; border: 1.5px solid #f0c040; border-radius: 8px; padding: 10px 12px; margin: 4px 0 12px; }
.refund-callout-title { font-size: 11px; font-weight: 700; color: #856404; text-transform: uppercase; margin-bottom: 4px; }
.refund-callout-note { font-size: 13px; color: #1a1a2e; line-height: 1.5; }
.refund-callout-meta { font-size: 11px; color: #aaa; margin-top: 4px; }

.panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; }
.detail-panel {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
  z-index: 101; max-height: 90vh; overflow-y: auto;
}
.panel-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto 4px; }
.panel-header { padding: 12px 16px 0; display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 17px; font-weight: 700; color: #1a1a2e; }
.btn-panel-close { padding: 6px 14px; background: transparent; border: 1.5px solid #dde1e7; border-radius: 8px; font-size: 13px; color: #888; cursor: pointer; }

.panel-tabs { display: flex; border-bottom: 1px solid #eee; margin: 12px 0 0; padding: 0 16px; }
.panel-tab { flex: 1; padding: 10px 4px; background: transparent; border: none; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.panel-tab.active { color: #1a1a2e; border-bottom-color: #c9a84c; }
.panel-tab-content { display: none; padding: 16px; }
.panel-tab-content.active { display: block; }

.d-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; gap: 12px; }
.d-row:last-child { border-bottom: none; }
.d-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.3px; min-width: 110px; padding-top: 1px; }
.d-value { color: #1a1a2e; text-align: right; word-break: break-word; flex: 1; }

.sig-link-box { background: #f0f7ff; border: 1px solid #c0d8f0; border-radius: 10px; padding: 12px 14px; margin: 4px 0 12px; }
.sig-link-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 6px; }
.sig-link-url { font-size: 12px; color: #1a6fa8; word-break: break-all; font-family: monospace; margin-bottom: 8px; line-height: 1.5; }
.btn-copy { padding: 6px 16px; background: #2c2c2c; color: #e0c97a; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }

.panel-actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; border-top: 1px solid #eee; position: sticky; bottom: 0; background: #fff; }
.btn-action { flex: 1; min-width: 100px; padding: 11px 8px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; display: block; }
.btn-action-gold  { background: #c9a84c; color: #1a1a1a; }
.btn-action-dark  { background: #2c2c2c; color: #e0c97a; }
.btn-action-blue  { background: #1a6fa8; color: #fff; }
.btn-action-green { background: #28a745; color: #fff; }
.btn-action-ghost { background: transparent; border: 1.5px solid #dde1e7; color: #555; }

.empty-state { text-align: center; padding: 48px 20px; color: #bbb; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.read-only-note { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #888; margin-bottom: 12px; text-align: center; }

@media (min-width: 600px) {
  .detail-panel { left: auto; right: 0; width: 480px; max-height: 100vh; border-radius: 0; top: 0; bottom: 0; }
}
</style>
</head>
<body>

<header class="cs-header">
  <div class="cs-header-left">
    <img src="/logos/joint.png" alt="Logo" onerror="this.style.display='none'">
    <div>
      <div class="cs-header-name" id="cs-name">Loading...</div>
      <div class="cs-header-role">Customer Service</div>
    </div>
  </div>
  <div class="cs-header-right">
    <span class="session-timer" id="session-timer"></span>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Total</div></div>
  <div class="stat-item"><div class="stat-val" id="stat-unsent">—</div><div class="stat-lbl">Unsent</div></div>
  <div class="stat-item"><div class="stat-val" id="stat-pending">—</div><div class="stat-lbl">Pending</div></div>
  <div class="stat-item"><div class="stat-val" id="stat-signed">—</div><div class="stat-lbl">Signed</div></div>
  <div class="stat-item"><div class="stat-val" id="stat-crm">—</div><div class="stat-lbl">CRM Done</div></div>
</div>

<div class="filter-bar">
  <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
  <button class="filter-tab" onclick="setFilter('unsent', this)">Unsent</button>
  <button class="filter-tab" onclick="setFilter('sent', this)">Sent</button>
  <button class="filter-tab" onclick="setFilter('viewed', this)">Viewed</button>
  <button class="filter-tab" onclick="setFilter('signed', this)">Signed</button>
  <button class="filter-tab" onclick="setFilter('refunded', this)">Refunded</button>
  <button class="filter-tab" onclick="setFilter('crm-pending', this)">CRM Pending</button>
</div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="🔍 Search by name,key word,sales rep..." oninput="renderList()">
  <select class="rep-filter" id="rep-filter" onchange="renderList()">
    <option value="">All Reps</option>
  </select>
</div>

<div class="sub-list" id="sub-list"></div>

<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>

<div class="detail-panel" id="detail-panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <span class="panel-title" id="panel-title">Details</span>
    <button class="btn-panel-close" onclick="closePanel()">✕ Close</button>
  </div>
  <div class="panel-tabs">
    <button class="panel-tab active" id="ptab-summary" onclick="showPanelTab('summary')">📋 Summary</button>
    <button class="panel-tab" id="ptab-signing" onclick="showPanelTab('signing')">🔗 Signing</button>
    <button class="panel-tab" id="ptab-history" onclick="showPanelTab('history')">📝 History</button>
  </div>
  <div class="panel-tab-content active" id="ptab-content-summary"></div>
  <div class="panel-tab-content" id="ptab-content-signing"></div>
  <div class="panel-tab-content" id="ptab-content-history"></div>
  <div id="cs-refund-callout" style="display:none;margin:0 16px 12px"></div>
  <div class="panel-actions" id="panel-actions"></div>
</div>

<script>
var TOKEN  = localStorage.getItem('rp_token');
var USER   = JSON.parse(localStorage.getItem('rp_user') || '{}');
var EXPIRY = localStorage.getItem('rp_expiry');
var allSubs = [];
var currentFilter = 'all';
var currentSub = null;
var signingLink = null;
var csSearchTimer = null;

if (!TOKEN || !EXPIRY || new Date() >= new Date(EXPIRY)) {
  window.location.href = '/login';
}

document.getElementById('cs-name').textContent = USER.name || 'CS';

// ── Session timer ─────────────────────────────────────────
function updateTimer() {
  if (!EXPIRY) return;
  var remaining = new Date(EXPIRY) - new Date();
  if (remaining <= 0) { localStorage.clear(); window.location.href = '/login'; return; }
  var mins = Math.floor(remaining / 60000);
  var secs = Math.floor((remaining % 60000) / 1000);
  var el = document.getElementById('session-timer');
  el.textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
  el.className = 'session-timer' + (mins < 5 ? ' warning' : '');
}
updateTimer();
setInterval(updateTimer, 1000);

// ── Load submissions ──────────────────────────────────────
function loadSubs() {
  fetch('/api/cs/submissions', { headers: { 'x-session-token': TOKEN } })
    .then(function(r) {
      if (r.status === 401) { window.location.href = '/login'; return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data) return;
      allSubs = data;
      renderStats();
      populateRepFilter();
      renderList();
    })
    .catch(function() {
      document.getElementById('sub-list').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Could not load submissions.</p></div>';
    });
}

function renderStats() {
  document.getElementById('stat-total').textContent   = allSubs.length;
  document.getElementById('stat-unsent').textContent  = allSubs.filter(function(s){ return s.signatureStatus==='unsent'; }).length;
  document.getElementById('stat-pending').textContent = allSubs.filter(function(s){ return s.signatureStatus==='sent'||s.signatureStatus==='viewed'; }).length;
  document.getElementById('stat-signed').textContent  = allSubs.filter(function(s){ return s.signatureStatus==='signed'; }).length;
  document.getElementById('stat-crm').textContent     = allSubs.filter(function(s){ return s.crmConfirmedAt; }).length;
}

function populateRepFilter() {
  var sel = document.getElementById('rep-filter');
  var existing = sel.value;
  var reps = [];
  allSubs.forEach(function(s) {
    if (s.salesRep && reps.indexOf(s.salesRep) === -1) reps.push(s.salesRep);
  });
  reps.sort();
  sel.innerHTML = '<option value="">All Reps</option>' + reps.map(function(r) {
    return '<option value="' + esc(r) + '">' + esc(r) + '</option>';
  }).join('');
  sel.value = existing;
}

function renderList() {
  clearTimeout(csSearchTimer);
  csSearchTimer = setTimeout(function() { _doRenderList(); }, 200);
}
function _doRenderList() {
  var q    = (document.getElementById('search-input').value || '').toLowerCase().trim();
  var rep  = document.getElementById('rep-filter').value;
  var filtered = allSubs.filter(function(s) {
    var matchQ   = !q   || (s.customerName||'').toLowerCase().includes(q)
      || (s.salesRep||'').toLowerCase().includes(q)
      || (s.customerEmail||'').toLowerCase().includes(q)
      || (s.salesNotes||'').toLowerCase().includes(q);
    var matchRep = !rep || s.salesRep === rep;
    var matchF   = currentFilter === 'all'
      || (currentFilter === 'refunded' && s.refundNote)
      || (currentFilter === 'crm-pending' && !s.crmConfirmedAt)
      || s.signatureStatus === currentFilter;
    return matchQ && matchRep && matchF;
  });

  var list = document.getElementById('sub-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No submissions found.</p></div>';
    return;
  }
  list.innerHTML = filtered.map(function(s) {
    var status = s.signatureStatus || 'unsent';
    var statusLabel = statusName(status);
    var date = new Date(s.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    var crmBadge = s.crmConfirmedAt ? ' <span class="badge badge-crm">✅ CRM</span>' : '';
    var refundBadge = s.refundNote ? ' <span class="badge badge-refunded">💰 Refund</span>' : '';
    var viewInfo = s.linkViewCount ? ' · 👁 ' + s.linkViewCount + 'x' : '';
    var sid = s.id;

    var html = '<div class="sub-card status-' + status + '" onclick="openPanel(\'' + sid + '\')">';
    html += '<div style="display:flex;align-items:flex-start;gap:8px">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">';
    html += '<span style="font-size:15px;font-weight:700;color:#1a1a2e">' + esc(s.customerName||'—') + '</span>';
    html += '<span class="badge badge-' + status + '">' + statusLabel + '</span>';
    html += '</div>';
    html += '<div style="font-size:12px;color:#888;margin-bottom:2px">' + esc(s.salesRep||'—') + ' &middot; ' + esc(s.saleCompany||'—') + ' &middot; $' + esc(s.transactionAmount||'—') + crmBadge + refundBadge + '</div>';
    html += '<div style="font-size:12px;color:#bbb;margin-bottom:4px">' + esc((s.products||[]).join(', ')||'—') + '</div>';
    html += '<div style="font-size:11px;color:#aaa">' + date + viewInfo + '</div>';
    html += '</div></div></div>';
    return html;
  }).join('');
} // end _doRenderList

function statusName(s) {
  if (s==='unsent')  return 'Unsent';
  if (s==='sent')    return 'Sent';
  if (s==='viewed')  return 'Viewed';
  if (s==='signed')  return 'Signed';
  return s ? s.charAt(0).toUpperCase()+s.slice(1) : 'Unsent';
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

// ── Detail panel ──────────────────────────────────────────
function openPanel(id) {
  var s = allSubs.find(function(x){ return x.id===id; });
  if (!s) return;
  currentSub  = s;
  signingLink = null;

  document.getElementById('panel-title').textContent = s.customerName || 'Details';

  var crmHtml = s.crmConfirmedAt
    ? '<span class="badge badge-crm">✅ Confirmed by ' + esc(s.crmConfirmedBy||'Admin') + ' · ' + new Date(s.crmConfirmedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '</span>'
    : '<span style="color:#aaa;font-size:13px">Not yet confirmed</span>';

  // Summary tab
  document.getElementById('ptab-content-summary').innerHTML =
    '<div class="read-only-note">👁 Read-only view</div>' +
    drow('Sales Rep', s.salesRep) +
    drow('Customer', s.customerName) +
    drow('Address', s.customerAddress) +
    drow('City / ZIP', s.customerCity) +
    drow('Email', s.customerEmail) +
    drow('Sale Date', s.saleDate||s.timestamp.slice(0,10)) +
    drow('Company', s.saleCompany) +
    drow('Products', (s.products||[]).join(', ')) +
    drow('Amount', '$'+(s.transactionAmount||'—')) +
    drow('Payment Plan', s.paymentPlan) +
    drow('Sales Notes', s.salesNotes) +
    drow('Rebate', s.rebateDiscount) +
    '<div class="d-row"><span class="d-label">CRM Status</span><span class="d-value">' + crmHtml + '</span></div>';

  // Signing tab
  var sigTabHtml = '<div class="sig-link-box"><div class="sig-link-label">🔗 Signing Link</div><div class="sig-link-url" id="sig-link-display">Generating...</div><button class="btn-copy" onclick="copySigningLink()">📋 Copy Link</button></div>' +
    drowHtml('Status', '<span class="badge badge-'+(s.signatureStatus||'unsent')+'">'+statusName(s.signatureStatus||'unsent')+'</span>') +
    drow('Link Sent', s.linkSentAt ? new Date(s.linkSentAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Not yet sent') +
    drow('First Opened', s.linkOpenedAt ? new Date(s.linkOpenedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Not yet opened') +
    drow('Last Viewed', s.linkLastViewedAt ? new Date(s.linkLastViewedAt).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—') +
    drow('Times Viewed', s.linkViewCount || 0) +
    (s.signedAt ? drow('Signed On', new Date(s.signedAt).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})) : '') +
    (s.signerName ? drow('Signed By', s.signerName) : '');
  document.getElementById('ptab-content-signing').innerHTML = sigTabHtml;

  // History tab
  var histHtml = drow('Submitted', new Date(s.timestamp).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}));
  if (s.lastEditedBy) histHtml += drow('Last Edited', s.lastEditedBy + ' · ' + new Date(s.lastEditedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}));
  if (s.crmConfirmedAt) histHtml += drow('CRM Confirmed', (s.crmConfirmedBy||'Admin') + ' · ' + new Date(s.crmConfirmedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}));
  if (s.editHistory && s.editHistory.length) {
    histHtml += '<div style="margin-top:8px"><div class="d-label" style="padding:8px 0">Edit Log</div>';
    s.editHistory.slice().reverse().forEach(function(e) {
      histHtml += '<div style="padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:12px">';
      histHtml += '<strong>' + esc(e.editedBy) + '</strong> · ' + new Date(e.editedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}) + '<br>';
      Object.keys(e.changedFields||{}).forEach(function(f) {
        histHtml += '<span style="color:#aaa">' + f + ': </span><span style="color:#e74c3c">' + esc(String(e.changedFields[f].from||'')) + '</span> → <span style="color:#40c070">' + esc(String(e.changedFields[f].to||'')) + '</span><br>';
      });
      histHtml += '</div>';
    });
    histHtml += '</div>';
  }
  document.getElementById('ptab-content-history').innerHTML = histHtml;

  // Actions
  var actions = document.getElementById('panel-actions');
  var refundActBtn = s.refundNote
    ? '<button class="btn-action btn-action-ghost" onclick="csOpenRefundModal()">💰 Edit Refund</button>'
    : '<button class="btn-action" style="background:#e67e22;color:#fff" onclick="csOpenRefundModal()">💰 Add Refund</button>';
  actions.innerHTML =
    '<a class="btn-action btn-action-gold" href="/api/pdf/'+s.id+'" target="_blank">⬇ Signed PDF</a>' +
    '<a class="btn-action btn-action-dark" href="/api/pdf/original/'+s.id+'" target="_blank">📄 Unsigned</a>' +
    '<button class="btn-action btn-action-blue" onclick="copySigningLink()">🔗 Copy Link</button>' +
    (!s.crmConfirmedAt ? '<button class="btn-action btn-action-green" onclick="confirmCRM()">✅ CRM Confirmed</button>' : '') +
    refundActBtn;

  // Refund callout
  var csRefundBox = document.getElementById('cs-refund-callout');
  if (s.refundNote) {
    csRefundBox.innerHTML = '<div class="refund-callout"><div class="refund-callout-title">💰 Refund Note</div><div class="refund-callout-note">'+esc(s.refundNote)+'</div><div class="refund-callout-meta">By '+(s.refundedBy||'Admin')+(s.refundedAt?' · '+new Date(s.refundedAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'')+"</div></div>";
    csRefundBox.style.display = 'block';
  } else {
    csRefundBox.style.display = 'none';
  }

  showPanelTab('summary');
  document.getElementById('panel-overlay').style.display = 'block';
  document.getElementById('detail-panel').style.display  = 'block';

  // Generate signing link
  if (s.signatureToken) {
    signingLink = window.location.origin + '/sign/' + s.signatureToken;
    var el = document.getElementById('sig-link-display');
    if (el) el.textContent = signingLink;
  } else {
    fetch('/api/send-signature/'+s.id, { method:'POST', headers:{'Content-Type':'application/json','x-session-token':TOKEN}, body:'{}' })
      .then(function(r){ return r.json(); })
      .then(function(result){
        if (result.success) {
          signingLink = result.signingLink;
          var el = document.getElementById('sig-link-display');
          if (el) el.textContent = signingLink;
        }
      });
  }
}

function showPanelTab(tab) {
  document.querySelectorAll('.panel-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.panel-tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('ptab-'+tab).classList.add('active');
  document.getElementById('ptab-content-'+tab).classList.add('active');
}

function closePanel() {
  document.getElementById('panel-overlay').style.display = 'none';
  document.getElementById('detail-panel').style.display  = 'none';
  currentSub  = null;
  signingLink = null;
}

function copySigningLink() {
  if (!signingLink) { alert('Generating link, please wait.'); return; }
  navigator.clipboard.writeText(signingLink).catch(function(){});
  var btn = event.target;
  var orig = btn.textContent;
  btn.textContent = '✅ Copied!';
  setTimeout(function(){ btn.textContent = orig; }, 2000);
}

function confirmCRM() {
  if (!currentSub) return;
  if (!confirm('Mark this receipt as confirmed in CRM?')) return;
  fetch('/api/submissions/'+currentSub.id+'/confirm-crm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-session-token': TOKEN },
    body: '{}'
  }).then(function(r){ return r.json(); })
  .then(function(result){
    if (result.success) { closePanel(); loadSubs(); }
    else { alert('Error: '+(result.error||'Unknown')); }
  }).catch(function(){ alert('Could not reach server.'); });
}

function csOpenRefundModal() {
  if (!currentSub) return;
  var existing = currentSub.refundNote || '';
  var note = prompt('Enter refund note (amount, reason, date, etc.):' + (existing ? ' Current: ' + existing : ''), existing);
  if (note === null) return;
  if (!note.trim()) { alert('Refund note cannot be empty.'); return; }
  fetch('/api/submissions/'+currentSub.id+'/refund', {
    method:'POST', headers:{'Content-Type':'application/json','x-session-token':TOKEN},
    body:JSON.stringify({refundNote:note.trim()})
  }).then(function(r){ return r.json(); }).then(function(result){
    if (result.success) { closePanel(); loadSubs(); }
    else { alert('Error: '+(result.error||'Unknown')); }
  }).catch(function(){ alert('Could not reach server.'); });
}

function doLogout() {
  fetch('/api/auth/logout', { method:'POST', headers:{'x-session-token':TOKEN} })
    .finally(function(){ localStorage.clear(); window.location.href = '/login'; });
}

function drow(label, val) {
  return '<div class="d-row"><span class="d-label">'+label+'</span><span class="d-value">'+esc(String(val||'—'))+'</span></div>';
}
function drowHtml(label, html) {
  return '<div class="d-row"><span class="d-label">'+label+'</span><span class="d-value">'+html+'</span></div>';
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadSubs();
setInterval(loadSubs, 30000);
</script>
</body>
</html>
